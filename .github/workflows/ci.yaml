name: CI
on:
  pull_request:
  push:
    branches:
    - 'main'
jobs:
  test:
    name: Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: ./go.mod
    - run: make setup
    - run: make test
  release:
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        if git show-ref --tags | grep -q -w -F "refs/tags/${VERSION}"; then
          echo "$VERSION already exists. Skipping release."
          exit 0
        fi
        gh release create "$VERSION" --generate-notes --target main
